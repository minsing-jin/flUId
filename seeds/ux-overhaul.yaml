goal: >
  flUId의 UX를 프로덕션 수준으로 끌어올린다. (1) GPT 생성 중 스켈레톤+스트리밍
  애니메이션, (2) shadcn급 시각 퀄리티 (그림자·둥글기·트랜지션·호버), (3) 블록
  드래그앤드롭 재배치, (4) 인터랙티브 컴포넌트 (버튼 클릭→상태변경, 입력→반영).

constraints:
  - 기존 코드 backward compatible
  - TypeScript strict
  - 기존 48 tests 유지
  - 드래그는 외부 라이브러리 없이 HTML5 Drag API로 구현 (의존성 최소화)

acceptance_criteria:
  - 로딩 중 스켈레톤 UI가 메인 영역에 표시되고 pulse 애니메이션이 동작
  - 생성 완료 시 fade-in 트랜지션으로 UI가 나타남
  - 블록에 그림자, 호버 효과, 부드러운 트랜지션이 적용
  - 블록을 드래그해서 순서를 바꿀 수 있음
  - 버튼 클릭 시 시각적 피드백 (ripple 또는 scale)
  - 입력 필드에 타이핑하면 해당 블록 상태가 반영
  - 전체적 시각 퀄리티가 shadcn/ui 수준에 근접
  - typecheck 8/8, test 48/48 유지

metadata:
  ambiguity_score: 0.05
  milestone: M-UX
